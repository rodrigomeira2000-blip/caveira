<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAVEIRA LABS</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #111827;
            --bg-primary: #1f2937;
            --border: #374151;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #ef4444;
            --accent-hover: #dc2626;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 1rem;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 0.5rem;
        }

        header h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
        }

        header span {
            color: var(--accent);
            font-weight: bold;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        .card h2 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-left: 4px solid var(--accent);
            padding-left: 0.5rem;
        }

        .cronometro-display {
            font-size: 2.5rem;
            font-weight: bold;
            text-align: center;
            font-family: monospace;
            margin: 1rem 0;
            background: var(--bg-primary);
            padding: 0.5rem;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        .btn-group {
            display: flex;
            gap: 0.5rem;
        }

        button, select, input {
            width: 100%;
            padding: 0.7rem;
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        button.btn-accent {
            background-color: var(--accent);
        }

        button.btn-accent:hover {
            background-color: var(--accent-hover);
        }

        .materia-container {
            margin-bottom: 1rem;
            background: var(--bg-primary);
            border-radius: 4px;
            overflow: hidden;
        }

        .materia-header {
            padding: 0.8rem;
            background: #1e293b;
            font-weight: bold;
        }

        .topicos-lista {
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .topico-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .topico-item input[type="checkbox"] {
            width: auto;
        }
    </style>
</head>
<body>

    <header>
        <h1>CAVEIRA <span>LABS</span></h1>
    </header>

    <div class="container">
        
        <div class="card">
            <h2>⏱️ Cronômetro de Combate</h2>
            <select id="materiaSelect" style="margin-bottom: 0.5rem;"></select>
            <div class="cronometro-display" id="tempoDisplay">00:00:00</div>
            <div class="btn-group">
                <button class="btn-accent" id="btnIniciar" onclick="alternarCronometro()">Iniciar</button>
                <button onclick="resetarCronometro()">Resetar</button>
            </div>
        </div>

        <div class="card">
            <h2>📊 Registro de Questões</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 0.5rem;">
                <div>
                    <label style="font-size:0.8rem; color:var(--text-muted)">Resolvidas</label>
                    <input type="number" id="qtdFeitas" placeholder="0">
                </div>
                <div>
                    <label style="font-size:0.8rem; color:var(--text-muted)">Erros</label>
                    <input type="number" id="qtdErros" placeholder="0">
                </div>
            </div>
            <button class="btn-accent" onclick="salvarQuestoes()">Computar Desempenho</button>
        </div>

        <div class="card">
            <h2>💀 Edital Geral (Guarda Municipal)</h2>
            <div id="editalContainer"></div>
        </div>

    </div>

    <script>
        // BANCO DE DADOS LOCAL DO EDITAL
        let bancoDados = [
            {
                id: "const",
                nome: "Direito Constitucional",
                topicos: [
                    { id: "c1", nome: "Art. 1º ao 5º (Direitos e Garantias Fundamentais)", concluido: false },
                    { id: "c2", nome: "Art. 144 (Segurança Pública)", concluido: false }
                ]
            },
            {
                id: "penal",
                nome: "Direito Penal",
                topicos: [
                    { id: "p1", nome: "Crimes contra a Administração Pública", concluido: false },
                    { id: "p2", nome: "Crimes contra a Pessoa", concluido: false },
                    { id: "p3", nome: "Lei de Abuso de Autoridade (Lei 13.869/19)", concluido: false }
                ]
            },
            {
                id: "port",
                nome: "Língua Portuguesa",
                topicos: [
                    { id: "pt1", nome: "Interpretação de Texto", concluido: false },
                    { id: "pt2", nome: "Sintaxe e Conjunções", concluido: false },
                    { id: "pt3", nome: "Crase e Regência", concluido: false }
                ]
            }
        ];

        // VARIÁVEIS DO CRONÔMETRO
        let tempoSegundos = 0;
        let cronometroInterval = null;
        let cronometroRodando = false;

        // INICIALIZAÇÃO
        window.onload = function() {
            carregarDados();
            renderizarTudo();
        };

        function renderizarTudo() {
            renderizarEdital();
            atualizarSelectMaterias();
        }

        // CONTROLADORES DO CRONÔMETRO
        function alternarCronometro() {
            const btn = document.getElementById('btnIniciar');
            if (cronometroRodando) {
                clearInterval(cronometroInterval);
                btn.innerText = "Iniciar";
                btn.style.backgroundColor = "var(--accent)";
            } else {
                cronometroInterval = setInterval(() => {
                    tempoSegundos++;
                    document.getElementById('tempoDisplay').innerText = formatarTempo(tempoSegundos);
                }, 1000);
                btn.innerText = "Pausar";
                btn.style.backgroundColor = "#ca8a04";
            }
            cronometroRodando = !cronometroRodando;
        }

        function resetarCronometro() {
            clearInterval(cronometroInterval);
            cronometroRodando = false;
            tempoSegundos = 0;
            document.getElementById('tempoDisplay').innerText = "00:00:00";
            document.getElementById('btnIniciar').innerText = "Iniciar";
            document.getElementById('btnIniciar').style.backgroundColor = "var(--accent)";
        }

        function formatarTempo(segundos) {
            let h = Math.floor(segundos / 3600).toString().padStart(2, '0');
            let m = Math.floor((segundos % 3600) / 60).toString().padStart(2, '0');
            let s = (segundos % 60).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        function atualizarSelectMaterias() {
            const select = document.getElementById('materiaSelect');
            select.innerHTML = bancoDados.map(m => `<option value="${m.id}">${m.nome}</option>`).join('');
        }

        // GERENCIADOR DO EDITAL
        function renderizarEdital() {
            const container = document.getElementById('editalContainer');
            container.innerHTML = bancoDados.map(materia => `
                <div class="materia-container">
                    <div class="materia-header">${materia.nome}</div>
                    <div class="topicos-lista">
                        ${materia.topicos.map(topico => `
                            <label class="topico-item">
                                <input type="checkbox" ${topico.concluido ? 'checked' : ''} 
                                    onchange="alternarTopico('${materia.id}', '${topico.id}')">
                                <span style="${topico.concluido ? 'text-decoration: line-through; color: var(--text-muted);' : ''}">
                                    ${topico.nome}
                                </span>
                            </label>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function alternarTopico(materiaId, topicoId) {
            const m = bancoDados.find(x => x.id === materiaId);
            if (m) {
                const t = m.topicos.find(y => y.id === topicoId);
                if (t) {
                    t.concluido = !t.concluido;
                }
            }
            salvarDados();
            renderizarEdital();
        }

        function salvarQuestoes() {
            const feitas = document.getElementById('qtdFeitas').value || 0;
            const erros = document.getElementById('qtdErros').value || 0;
            alert(`Sessão Registrada!\nRespondidas: ${feitas}\nErros: ${erros}\nTaxa de Acerto: ${feitas > 0 ? Math.round(((feitas - erros) / feitas) * 100) : 0}%`);
            document.getElementById('qtdFeitas').value = '';
            document.getElementById('qtdErros').value = '';
        }

        function salvarDados() {
            localStorage.setItem('caveira_labs_edital', JSON.stringify(bancoDados));
        }

        function carregarDados() {
            const dadosSalvos = localStorage.getItem('caveira_labs_edital');
            if (dadosSalvos) {
                bancoDados = JSON.parse(dadosSalvos);
            }
        }
    </script>
</body>
</html>
